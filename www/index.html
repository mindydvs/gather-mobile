<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gather</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .loader h1 {
      font-size: 28px;
      font-weight: 700;
    }
    .loader p {
      font-size: 16px;
      color: #888;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #eee;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <h1>Gather</h1>
    <div class="spinner"></div>
    <p>Loading your calendar...</p>
  </div>
  <script>
    // This fallback page only shows if gathercal.com can't be reached.
    // Normally Capacitor loads the live site directly.
    setTimeout(() => {
      window.location.href = 'https://gathercal.com';
    }, 2000);
  </script>
</body>
</html>
